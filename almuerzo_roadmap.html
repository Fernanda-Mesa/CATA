<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tickets de Almuerzo CATA</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f4f9;
        margin: 0;
        padding: 20px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
    }

    @media print {
        body {
            background-color: white;
            padding: 0;
        }
        .no-print {
            display: none;
        }
        .card {
            box-shadow: none !important;
            border: 1px dashed #ccc !important;
        }
    }

    .card {
        width: 85.6mm; 
        height: 53.98mm;
        background-color: #ffffff;
        border: 2px solid #002B5B;
        border-radius: 8px;
        box-sizing: border-box;
        padding: 15px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        text-align: center;
        box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
        page-break-inside: avoid;
    }

    /* Estilos actualizados para la imagen del logo */
    .logo {
        max-width: 100%;
        max-height: 40px; /* Ajusta este valor si necesitas que el logo sea más grande o más pequeño */
        object-fit: contain; /* Esto evita que el logo se estire o se deforme */
        margin-top: 5px;
    }

    .message {
        font-size: 16px;
        font-weight: bold;
        color: #333333;
        margin: 0;
    }

    /* Tamaño de fuente ajustado para que el texto largo quepa en una o dos líneas */
    .footer {
        font-size: 9px; 
        font-weight: bold;
        color: #666666;
        text-transform: uppercase;
        margin-bottom: 5px;
    }

    .btn-imprimir {
        background-color: #002B5B;
        color: white;
        border: none;
        padding: 12px 24px;
        font-size: 16px;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
    }
    .btn-imprimir:hover {
        background-color: #001a36;
    }
</style>
</head>
<body>

<div class="no-print" style="width: 100%; text-align: center; margin-bottom: 30px;">
    <h2>Generador de Tarjetas CATA</h2>
    <button class="btn-imprimir" onclick="window.print()">🖨️ Imprimir Tarjetas</button>
    <p style="color: #555;">Se generarán 50 tarjetas listas para recortar.<br>Asegúrate de ajustar los márgenes a "Mínimo" en la vista previa de impresión.</p>
</div>

<script>
    const totalPersonas = 50;
    
    for (let i = 0; i < totalPersonas; i++) {
        document.write(`
            <div class="card">
                <img src="https://oficina-tt.github.io/CATA/logo_cata.png" alt="Logo CATA" class="logo">
                <div class="message">TICKET ALMUERZO</div>
                <div class="footer">3° Jornada Roadmap Tecnológico | Unidad de Transferencia Tecnológica e Innovación | edición 2026</div>
            </div>
        `);
    }
</script>

</body>
</html>
